<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WG Manager</title>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <style>
    :root { --bg: #121212; --surface: #1e1e1e; --accent: #4ade80; --text: #ffffff; --muted: #a0a0a0; --radius: 12px; }
    body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; max-width: 480px; margin: 0 auto; padding: 20px; padding-bottom: 60px; overflow-x: hidden; }
    h1 { text-align: center; color: var(--accent); margin-bottom: 30px; }
    .card { background: var(--surface); padding: 20px; border-radius: var(--radius); margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    h2 { margin-top: 0; font-size: 18px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
    input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: white; }
    button { background: var(--accent); color: #000; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    button:hover { opacity: 0.8; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { background: #2a2a2a; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    li .item-text { flex: 1; word-break: break-word; }
    .delete-btn { cursor: pointer; flex-shrink: 0; }
    .link-btn { display: inline-block; background: #333; color: var(--accent); padding: 4px 8px; border-radius: 6px; text-decoration: none; font-size: 12px; margin-top: 4px; border: 1px solid #444; }

    /* WG Jobs */
    .job-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #333; }
    .job-left { display: flex; align-items: center; gap: 10px; }
    .job-name { color: var(--text); }
    .person { font-weight: bold; color: var(--accent); cursor: pointer; background: #2a2a2a; padding: 4px 8px; border-radius: 6px; font-size: 14px; }
    .checkbox { cursor: pointer; font-size: 20px; user-select: none; }

    /* --- SWIPE DESIGN --- */
    .scan-btn { width: 100%; margin-bottom: 15px; background: #3b82f6; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px; font-size: 16px;}
    .totals-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 16px; border-bottom: 1px dashed #333; padding-bottom: 8px;}
    .totals-row:last-child { border-bottom: none; }
    .totals-price { font-weight: bold; color: var(--accent); }

    .swipe-container { position: relative; height: 220px; display: flex; justify-content: center; align-items: center; margin-top: 15px; }
    .swipe-card { position: absolute; background: var(--accent); color: #000; width: 220px; height: 180px; border-radius: 16px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); cursor: grab; user-select: none; transition: transform 0.3s ease; z-index: 10; }
    .swipe-card.dragging { transition: none; cursor: grabbing; }
    .swipe-card.hidden { display: none; }
    
    .item-name { font-size: 20px; font-weight: bold; margin-bottom: 10px; text-align: center; padding: 0 10px;}
    .item-price { font-size: 18px; font-weight: bold; background: #000; color: var(--accent); padding: 5px 15px; border-radius: 20px;}

    .instructions { text-align: center; color: var(--muted); font-size: 12px; margin-top: 15px; line-height: 1.6; }
    .done-message { position: absolute; color: var(--muted); font-size: 16px; text-align: center; }
  </style>
</head>
<body>

  <h1>🏠 WG Manager</h1>

  <div class="card">
    <h2>🛒 Einkaufsliste</h2>
    <div class="input-group">
      <input type="text" id="itemInput" placeholder="Was brauchen wir?">
      <button onclick="addShoppingItem()">Dazu</button>
    </div>
    <ul id="shoppingList"></ul>
  </div>

  <div class="card">
    <h2>🧹 Job Rotation</h2>
    <div id="jobList"></div>
    <button onclick="rotateJobs()" style="width: 100%; margin-top: 15px; background: #333; color: white;">Nächste Woche starten</button>
  </div>

  <div class="card">
    <h2>📝 Notizen & To-dos</h2>
    <div class="input-group">
      <input type="text" id="noteInput" placeholder="Notiz oder Link...">
      <button onclick="addNote()">Dazu</button>
    </div>
    <ul id="noteList"></ul>
  </div>

  <!-- NEU: Kassen-Splitter mit Scan-Button und editierbaren Namen -->
  <div class="card">
    <h2>💸 Kassen-Splitter</h2>
    
    <button class="scan-btn" onclick="startFakeScan()">📸 Kassenzettel scannen (KI)</button>

    <div class="totals-row">
      <span class="person" onclick="editSplitName(0)" id="nameLeft">👈 Mitbewohner ✏️</span>
      <span class="totals-price" id="totalMitbewohner">0.00 €</span>
    </div>
    <div class="totals-row">
      <span class="person" onclick="editSplitName(1)" id="nameRight1">👉 Du ✏️</span>
      <span class="totals-price" id="totalDu">0.00 €</span>
    </div>
    <div class="totals-row">
      <span class="person" onclick="editSplitName(2)" id="nameRight2">👉 Zwillingsbruder ✏️</span>
      <span class="totals-price" id="totalBruder">0.00 €</span>
    </div>

    <div class="swipe-container" id="swipeContainer">
      <div class="done-message">Alles gesplittet! 🎉</div>
      
      <!-- Die Karte ist am Anfang unsichtbar (class="hidden") -->
      <div class="swipe-card hidden" id="card">
        <div class="item-name" id="itemName">Lädt...</div>
        <div class="item-price" id="itemPrice">-</div>
      </div>
    </div>

    <div class="instructions">
      👇 <b>Unten Wischen:</b> Alle drei zahlen (jeweils 33%)
    </div>
  </div>

  <script>
    // --- FIREBASE STARTEN ---
    const firebaseConfig = {
      apiKey: "AIzaSyCmiRxVD9uxMBV_6SwQr2_c83ZrfUYHnuA",
      authDomain: "wg-manager-9637e.firebaseapp.com",
      databaseURL: "https://wg-manager-9637e-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "wg-manager-9637e",
      storageBucket: "wg-manager-9637e.firebasestorage.app",
      messagingSenderId: "961103814270",
      appId: "1:961103814270:web:7936ef5e9c4d200b59822f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- EINKAUFSLISTE ---
    db.ref("shoppingList").on("value", (snapshot) => {
      let list = document.getElementById("shoppingList");
      list.innerHTML = "";
      snapshot.forEach((child) => {
        list.innerHTML += `<li><span class="item-text">${child.val().text}</span><span class="delete-btn" onclick="deleteShoppingItem('${child.key}')">❌</span></li>`;
      });
    });
    function addShoppingItem() { let inputField = document.getElementById("itemInput"); if (inputField.value.trim() !== "") { db.ref("shoppingList").push({ text: inputField.value.trim() }); inputField.value = ""; } }
    function deleteShoppingItem(key) { db.ref("shoppingList/" + key).remove(); }

    // --- NOTIZEN ---
    db.ref("notes").on("value", (snapshot) => {
      let list = document.getElementById("noteList");
      list.innerHTML = "";
      snapshot.forEach((child) => {
        let text = child.val().text.replace(/(https?:\/\/[^\s]+)/g, `<br><a href="$1" target="_blank" class="link-btn">🔗 Link öffnen</a>`);
        list.innerHTML += `<li><span class="item-text">${text}</span><span class="delete-btn" onclick="deleteNote('${child.key}')">❌</span></li>`;
      });
    });
    function addNote() { let inputField = document.getElementById("noteInput"); if (inputField.value.trim() !== "") { db.ref("notes").push({ text: inputField.value.trim() }); inputField.value = ""; } }
    function deleteNote(key) { db.ref("notes/" + key).remove(); }

    // --- WG JOBS ---
    let roommates = ["Levi", "Mitbewohner 1", "Mitbewohner 2"];
    let jobs = ["Müll & Altglas", "Küche & Bad", "Böden saugen"];
    let jobStatus = [false, false, false];

    db.ref("jobData").on("value", (snapshot) => {
      let data = snapshot.val();
      if (data) { roommates = data.roommates || roommates; jobs = data.jobs || jobs; jobStatus = data.jobStatus || jobStatus; }
      renderJobsLocal();
    });
    function saveJobsToFirebase() { db.ref("jobData").set({ roommates: roommates, jobs: jobs, jobStatus: jobStatus }); }
    function renderJobsLocal() {
      let jobContainer = document.getElementById("jobList");
      jobContainer.innerHTML = ""; 
      for (let i = 0; i < jobs.length; i++) {
        let textStyle = jobStatus[i] ? "text-decoration: line-through; color: var(--muted);" : "";
        jobContainer.innerHTML += `<div class="job-row"><div class="job-left"><span class="checkbox" onclick="toggleJob(${i})">${jobStatus[i] ? "✅" : "🔲"}</span><span class="job-name" style="${textStyle}; cursor: pointer;" onclick="editJob(${i})">${jobs[i]} ✏️</span></div><span class="person" onclick="editName(${i})">${roommates[i]} ✏️</span></div>`;
      }
    }
    function toggleJob(i) { jobStatus[i] = !jobStatus[i]; saveJobsToFirebase(); }
    function editName(i) { let n = prompt("Wer übernimmt diesen Job?", roommates[i]); if(n) { roommates[i] = n.trim(); saveJobsToFirebase(); } }
    function editJob(i) { let j = prompt("Wie soll die Aufgabe heißen?", jobs[i]); if(j) { jobs[i] = j.trim(); saveJobsToFirebase(); } }
    function rotateJobs() { roommates.unshift(roommates.pop()); jobStatus = [false, false, false]; saveJobsToFirebase(); }

    // --- SWIPE KASSEN-SPLITTER ---
    
    // Cloud-Speicher für die Namen im Splitter
    let splitNames = ["Mitbewohner", "Du", "Bruder"];
    db.ref("splitNames").on("value", (snapshot) => {
      let data = snapshot.val();
      if (data) { splitNames = data; }
      document.getElementById("nameLeft").innerText = `👈 ${splitNames[0]} ✏️`;
      document.getElementById("nameRight1").innerText = `👉 ${splitNames[1]} ✏️`;
      document.getElementById("nameRight2").innerText = `👉 ${splitNames[2]} ✏️`;
    });

    function editSplitName(index) {
      let n = prompt("Wie heißt diese Person?", splitNames[index]);
      if (n && n.trim() !== "") {
        splitNames[index] = n.trim();
        db.ref("splitNames").set(splitNames);
      }
    }

    let receipt = [
      { name: "Räuchertofu", price: 2.19 },
      { name: "Hafermilch", price: 2.49 },
      { name: "Spülmittel", price: 1.50 },
      { name: "Toilettenpapier", price: 3.99 },
      { name: "Hummus", price: 1.99 }
    ];

    let currentItemIndex = 0;
    let kasseMitbewohner = 0, kasseDu = 0, kasseBruder = 0;
    
    const card = document.getElementById("card");
    const itemNameDisplay = document.getElementById("itemName");
    const itemPriceDisplay = document.getElementById("itemPrice");

    // Startet den Scan-Test
    function startFakeScan() {
      alert("📸 KI-Scanner ist in Arbeit!\nWir laden erst mal den Test-Bon, damit ihr das Wischen auf dem Handy ausprobieren könnt.");
      kasseMitbewohner = 0; kasseDu = 0; kasseBruder = 0;
      currentItemIndex = 0;
      updateTotals();
      loadNextItem();
    }

    function loadNextItem() {
      if (currentItemIndex < receipt.length) {
        card.classList.remove("hidden");
        let item = receipt[currentItemIndex];
        itemNameDisplay.innerText = item.name;
        itemPriceDisplay.innerText = item.price.toFixed(2) + " €";
        card.style.transform = `translate(0px, 0px) rotate(0deg)`;
      } else {
        card.classList.add("hidden");
      }
    }

    function splitMoney(direction, price) {
      if (direction === "left") kasseMitbewohner += price;
      else if (direction === "right") { kasseDu += price / 2; kasseBruder += price / 2; }
      else if (direction === "down") { kasseMitbewohner += price / 3; kasseDu += price / 3; kasseBruder += price / 3; }
      updateTotals();
    }

    function updateTotals() {
      document.getElementById("totalMitbewohner").innerText = kasseMitbewohner.toFixed(2) + " €";
      document.getElementById("totalDu").innerText = kasseDu.toFixed(2) + " €";
      document.getElementById("totalBruder").innerText = kasseBruder.toFixed(2) + " €";
    }

    let isDragging = false, startX = 0, startY = 0, currentX = 0, currentY = 0;

    function dragStart(e) {
      if (currentItemIndex >= receipt.length || card.classList.contains("hidden")) return;
      isDragging = true;
      card.classList.add("dragging");
      startX = e.type.includes("mouse") ? e.pageX : e.touches[0].pageX;
      startY = e.type.includes("mouse") ? e.pageY : e.touches[0].pageY;
      if(e.type.includes("touch")) e.preventDefault(); 
    }

    function dragMove(e) {
      if (!isDragging) return;
      let x = e.type.includes("mouse") ? e.pageX : e.touches[0].pageX;
      let y = e.type.includes("mouse") ? e.pageY : e.touches[0].pageY;
      currentX = x - startX;
      currentY = y - startY;
      let rotate = currentX * 0.1; 
      card.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${rotate}deg)`;
    }

    function dragEnd() {
      if (!isDragging) return;
      isDragging = false;
      card.classList.remove("dragging");

      let currentPrice = receipt[currentItemIndex].price;
      let threshold = 80;

      if (currentX < -threshold) { splitMoney("left", currentPrice); currentItemIndex++; } 
      else if (currentX > threshold) { splitMoney("right", currentPrice); currentItemIndex++; } 
      else if (currentY > threshold && Math.abs(currentX) < threshold) { splitMoney("down", currentPrice); currentItemIndex++; }

      loadNextItem();
      currentX = 0; currentY = 0;
    }

    card.addEventListener("mousedown", dragStart); document.addEventListener("mousemove", dragMove); document.addEventListener("mouseup", dragEnd);
    card.addEventListener("touchstart", dragStart, {passive: false}); document.addEventListener("touchmove", dragMove, {passive: false}); document.addEventListener("touchend", dragEnd);

  </script>
</body>
</html>
