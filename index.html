<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WG Manager</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    :root { --bg: #121212; --surface: #1e1e1e; --accent: #4ade80; --text: #ffffff; --muted: #a0a0a0; --radius: 12px; }
    body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; max-width: 480px; margin: 0 auto; padding: 20px; padding-bottom: 60px; overflow-x: hidden; }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    h1 { color: var(--accent); margin: 0; font-size: 24px;}
    .settings-btn { background: #2a2a2a; border: 1px solid #444; color: white; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .card { background: var(--surface); padding: 20px; border-radius: var(--radius); margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    h2 { margin-top: 0; font-size: 18px; border-bottom: 1px solid #333; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
    .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
    input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: white; }
    button { background: var(--accent); color: #000; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { background: #2a2a2a; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .scan-btn { width: 100%; background: #3b82f6; color: white; padding: 14px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; }
    .swipe-container { position: relative; height: 220px; display: flex; justify-content: center; align-items: center; }
    .swipe-card { position: absolute; background: var(--accent); color: #000; width: 220px; height: 180px; border-radius: 16px; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
    .hidden { display: none; }
    .loading-pulse { animation: pulse 1.5s infinite; background: #f5c800; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
  </style>
</head>
<body>

  <div class="header-row"><h1>🏠 WG Manager</h1><button class="settings-btn" onclick="openSettings()">⚙️</button></div>

  <div class="card">
    <h2>📸 Bon Scannen</h2>
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;" onchange="processReceipt(event)">
    <button class="scan-btn" onclick="document.getElementById('cameraInput').click()">📸 Kamera öffnen</button>
    <div class="swipe-container" id="swipeContainer">
      <div class="swipe-card hidden" id="card">
        <div id="itemName" style="font-weight:bold">Lädt...</div>
        <div id="itemPrice" style="background:#000; color:#4ade80; padding:5px; border-radius:10px; margin-top:10px">-</div>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = { apiKey: "AIzaSyCmiRxVD9uxMBV_6SwQr2_c83ZrfUYHnuA", authDomain: "wg-manager-9637e.firebaseapp.com", databaseURL: "https://wg-manager-9637e-default-rtdb.europe-west1.firebasedatabase.app", projectId: "wg-manager-9637e", storageBucket: "wg-manager-9637e.firebasestorage.app", messagingSenderId: "961103814270", appId: "1:961103814270:web:7936ef5e9c4d200b59822f" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const card = document.getElementById("card");
    const itemNameDisplay = document.getElementById("itemName");
    const itemPriceDisplay = document.getElementById("itemPrice");
    let receipt = [];

    function openSettings() { let k = prompt("API Key eingeben:", localStorage.getItem("geminiApiKey") || ""); if(k) localStorage.setItem("geminiApiKey", k.trim()); }

    async function processReceipt(event) {
      const file = event.target.files[0];
      if (!file) return;
      const apiKey = localStorage.getItem("geminiApiKey");
      card.classList.remove("hidden"); card.classList.add("loading-pulse");
      
      const reader = new FileReader();
      reader.onload = async function() {
        const base64Image = reader.result.split(',')[1];
        try {
          // WICHTIG: Pfad auf v1 geändert
          const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
            body: JSON.stringify({ contents: [{ parts: [{ text: "Lies den Bon. Antworte NUR mit einem JSON-Array: [{\"name\":\"Artikel\",\"price\":0.00}]" }, { inline_data: { mime_type: file.type, data: base64Image } }] }] })
          });
          
          if (!response.ok) throw new Error("Status " + response.status);
          
          const data = await response.json();
          let rawText = data.candidates[0].content.parts[0].text;
          let jsonString = rawText.substring(rawText.indexOf("["), rawText.lastIndexOf("]") + 1);
          receipt = JSON.parse(jsonString);
          
          itemNameDisplay.innerText = receipt[0].name;
          itemPriceDisplay.innerText = receipt[0].price.toFixed(2) + " €";
          card.classList.remove("loading-pulse");
        } catch (e) { alert("Fehler: " + e.message); card.classList.add("hidden"); }
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
